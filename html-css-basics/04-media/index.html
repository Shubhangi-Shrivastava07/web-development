<header>

<main>
    <!--IMAGE-->
    <section>
        <h2>1.Image Example</h2>

        <figure>
            <img
            src="https://png.pngtree.com/png-clipart/20250109/original/pngtree-cute-bird-illustration-png-image_18964640.png"

            <figcaption>
                <b>cute bird</b> 
            </figcaption>
         </figure>
    </section>


    <!--LINKS-->
    <section>

        </a>
